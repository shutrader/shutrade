<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>複利シミュレーター｜シュウ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#182a4e;--navy-deep:#0f1d38;--paper:#FAF9F6;--card:#fff;--gold:#C9A14A;--gold-deep:#9A7726;--ink:#1F2933;--muted:#6E7177;--faint:#9AA0A8;--line:rgba(15,29,56,.10);--line-strong:rgba(15,29,56,.18);--ok:#3B7D5A;--warn:#A77B1E;--bad:#A3403A}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.8;-webkit-font-smoothing:antialiased}
.mono{font-family:'Roboto Mono',monospace;font-variant-numeric:tabular-nums}
.wrap{max-width:760px;margin:0 auto;padding:0 22px}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:3px}
header{background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:.5px solid var(--line);position:sticky;top:0;z-index:5}
.bar{display:flex;align-items:center;height:58px;gap:14px}
.back{font-size:13px;color:var(--navy);display:inline-flex;align-items:center;gap:6px}
.back:hover{color:var(--gold-deep)}
.bar .sep{color:var(--faint)}.bar .here{font-size:13px;color:var(--muted)}
main{padding:38px 0 60px}
.kicker{font-family:'Roboto Mono',monospace;font-size:12px;letter-spacing:.24em;color:var(--gold-deep);margin-bottom:8px}
h1{font-weight:700;font-size:26px;color:var(--navy);margin-bottom:6px}
.sub{font-size:13.5px;color:var(--muted);margin-bottom:30px;max-width:42em}
.panel{background:var(--card);border:.5px solid var(--line);border-radius:14px;padding:24px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:560px){.grid{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column}.field.full{grid-column:1/-1}
label{font-size:12px;color:var(--muted);margin-bottom:6px}
select,input{width:100%;font-family:inherit;font-size:14px;color:var(--ink);background:#fff;border:.5px solid var(--line-strong);border-radius:8px;padding:10px 12px}
select:focus,input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,161,74,.15)}
.result{margin-top:22px;border-top:.5px solid var(--line);padding-top:22px}
.rows{display:grid;gap:0}
.row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:.5px solid var(--line);font-size:13.5px}
.row:last-child{border-bottom:none}.row .k{color:var(--muted)}.row .v{font-weight:500;text-align:right}
.big{display:flex;align-items:baseline;gap:8px;margin:4px 0}
.big .num{font-family:'Roboto Mono',monospace;font-weight:500;font-size:30px;color:var(--navy)}
.big .u{font-size:13px;color:var(--muted)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:12px;margin-top:8px}
.metric{background:var(--paper);border-radius:10px;padding:12px 14px}
.metric .ml{font-size:11px;color:var(--muted);margin-bottom:3px}
.metric .mv{font-family:'Roboto Mono',monospace;font-weight:500;font-size:18px;color:var(--ink)}
.vbadge{font-family:'Roboto Mono',monospace;font-weight:500;font-size:14px;letter-spacing:.06em;padding:7px 16px;border-radius:9px;display:inline-block}
.v-go{background:rgba(59,125,90,.12);color:var(--ok)}.v-wait{background:rgba(201,161,74,.16);color:var(--gold-deep)}.v-bad{background:rgba(163,64,58,.1);color:var(--bad)}
.btn-gold{background:var(--gold);color:#2a2008;font-weight:500;font-size:14px;padding:11px 20px;border:none;border-radius:8px}
.btn-gold:hover{background:#d8b35f}
.btn-ghost{background:none;border:.5px solid var(--line-strong);color:var(--muted);font-size:12px;padding:8px 13px;border-radius:7px}
.btn-ghost:hover{color:var(--ink)}
.note{font-size:12px;color:var(--faint);line-height:1.8;margin-top:18px}
footer{border-top:.5px solid var(--line);margin-top:30px;padding-top:18px}
.disc{font-size:11px;color:var(--faint);line-height:1.8}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}

.bars{display:flex;align-items:flex-end;gap:4px;height:120px;margin-top:18px}
.bars .b{flex:1;background:var(--gold);border-radius:3px 3px 0 0;min-height:2px}
.bars .b:last-child{background:var(--navy)}
.axis{display:flex;justify-content:space-between;font-family:'Roboto Mono',monospace;font-size:10px;color:var(--faint);margin-top:6px}
</style>
<style>@media(max-width:600px){table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}img{max-width:100%;height:auto}}</style></head>
<body>
<header><div class="wrap bar">
  <a class="back" href="index.html">‹ シュウ トレードマネジメント</a>
  <span class="sep">/</span><span class="here">複利シミュレーター</span>
</div></header>

<main class="wrap">
  <div class="kicker">TOOL — COMPOUND</div>
  <h1>複利シミュレーター</h1>
  <p class="sub">初期資金・月利・期間から、複利で資金がどう増えるかを試算します。続ける意味を体感するためのツールです。</p>

  <div class="panel">
    <div class="grid">
      <div class="field"><label for="p">初期資金（円）</label><input id="p" type="number" min="0" step="10000" value="500000" inputmode="numeric"></div>
      <div class="field"><label for="r">月利（％）</label><input id="r" type="number" step="0.5" value="10" inputmode="decimal"></div>
      <div class="field"><label for="m">期間（ヶ月）</label><input id="m" type="number" min="1" max="120" step="1" value="12" inputmode="numeric"></div>
    </div>
    <div class="result" id="result"></div>
  </div>
  <p class="note">複利は理論値です。実際はドローダウン（連敗）や月ごとの勝率のブレがあり、毎月一定の利益にはなりません。「同じ月利でも続けると曲線的に増える」という感覚をつかむためのものです。</p>

  <footer><p class="disc">※本ツールは投資教育を目的とした目安であり、特定の売買を推奨・助言するものではありません。最終判断はご自身の責任で行ってください。</p></footer>
</main>
<script>
const yen=n=>Math.round(n).toLocaleString('ja-JP');const num=(n,d=0)=>Number(n).toLocaleString('ja-JP',{minimumFractionDigits:d,maximumFractionDigits:d});const $=id=>document.getElementById(id);
function calc(){
 const p=parseFloat($("p").value)||0, r=parseFloat($("r").value)||0, m=Math.min(120,Math.max(1,parseInt($("m").value)||1));
 const series=[]; let bal=p;
 for(let i=0;i<=m;i++){ series.push(bal); bal*=(1+r/100); }
 const fin=series[m]; const mult=p>0?fin/p:0;
 const max=Math.max(...series);
 const step=Math.ceil(series.length/24);
 const shown=series.filter((_,i)=>i%step===0||i===series.length-1);
 const bars=shown.map((v,i)=>`<div class="b" style="height:${max>0?Math.max(2,v/max*120):2}px" title="${yen(v)}円"></div>`).join("");
 $("result").innerHTML = `
  <div class="metrics">
   <div class="metric"><div class="ml">${m}ヶ月後の資金</div><div class="mv">${yen(fin)}</div></div>
   <div class="metric"><div class="ml">増加倍率</div><div class="mv">${num(mult,2)} 倍</div></div>
   <div class="metric"><div class="ml">増加額</div><div class="mv">${yen(fin-p)}</div></div>
  </div>
  <div class="bars">${bars}</div>
  <div class="axis"><span>開始</span><span>${m}ヶ月</span></div>`;
}
["p","r","m"].forEach(id=>$(id).addEventListener("input",calc));calc();

</script>
</body>
</html>
